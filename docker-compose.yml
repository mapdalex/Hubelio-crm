# Docker Compose für CRM System
# Verwendung mit Coolify oder selbst-gehostet

services:
  # PostgreSQL Datenbank
  db:
    image: postgres:16-alpine
    container_name: crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-crm_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_database}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - crm-network

  # Next.js CRM Anwendung
  app:
    image: ${CRM_APP_IMAGE:-hubelio-crm:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/${POSTGRES_DB:-crm_database}
    container_name: crm-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/${POSTGRES_DB:-crm_database}
      AUTH_SECRET: ${AUTH_SECRET:-your-secret-key-change-in-production-min-32-chars}
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # Setze auf 'false' wenn du kein HTTPS verwendest (localhost/Docker ohne SSL)
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - crm-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  crm-network:
    driver: bridge
