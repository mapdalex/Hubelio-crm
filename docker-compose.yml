version: '3.8'

services:
  # PostgreSQL Datenbank
  db:
    image: postgres:16-alpine
    container_name: crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-crm_database}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "crm_user", "-d", "crm_database"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - crm-network

  # Next.js CRM Anwendung
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/${POSTGRES_DB:-crm_database}
      AUTH_SECRET: ${AUTH_SECRET:-your-secret-key-change-in-production-min-32-chars}
      NODE_ENV: production
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - crm-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  crm-network:
    driver: bridge
