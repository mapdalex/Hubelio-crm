# Portainer Stack für Hubelio CRM
# Diese Datei kann direkt in Portainer als Stack importiert werden
# 
# Anleitung:
# 1. In Portainer: Environments > Dein Server
# 2. Stacks > Add Stack
# 3. Diese Datei einfügen oder aus Repository ziehen
# 4. Environment Variables setzen
# 5. Deploy

version: '3.8'

services:
  # PostgreSQL Datenbank
  crm-db:
    image: postgres:16-alpine
    container_name: hubelio-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-crm_database}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    volumes:
      - crm_postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-crm_user}", "-d", "${POSTGRES_DB:-crm_database}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - crm-network
    labels:
      - "com.example.description=Hubelio CRM PostgreSQL Database"

  # Next.js CRM Anwendung
  crm-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-change_me_in_production}@crm-db:5432/${POSTGRES_DB:-crm_database}
    container_name: hubelio-crm-app
    restart: unless-stopped
    depends_on:
      crm-db:
        condition: service_healthy
    environment:
      # Datenbank
      DATABASE_URL: postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-change_me_in_production}@crm-db:5432/${POSTGRES_DB:-crm_database}
      
      # Authentifizierung
      AUTH_SECRET: ${AUTH_SECRET:-your-super-secret-key-change-in-production-min-32-chars}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      
      # Produktion
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      
      # Cookie Security (false für HTTP, true für HTTPS)
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      
      # Port
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      
      # Optional: E-Mail SMTP (kann auch in Admin-UI konfiguriert werden)
      # SMTP_HOST: ${SMTP_HOST:-}
      # SMTP_PORT: ${SMTP_PORT:-587}
      # SMTP_USER: ${SMTP_USER:-}
      # SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      # SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - crm_uploads_data:/app/uploads
    networks:
      - crm-network
    labels:
      - "com.example.description=Hubelio CRM Application"

volumes:
  crm_postgres_data:
    driver: local
  crm_uploads_data:
    driver: local

networks:
  crm-network:
    driver: bridge
