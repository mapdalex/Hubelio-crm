[phases.setup]
nixPkgs = ["nodejs_20", "pnpm", "openssl"]

[phases.install]
cmds = ["pnpm install"]

[phases.build]
cmds = ["npx prisma generate", "pnpm build"]

[start]
cmd = "npx prisma db push --skip-generate && pnpm start"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
# Dummy URL for build time - real URL is set in Coolify environment
DATABASE_URL = "postgresql://user:password@localhost:5432/crm"
